<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightScope</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-5">
            <div class="flex items-center justify-between">
                <a href="/" class="text-xl font-bold tracking-tight hover:text-blue-200 transition">FlightScope</a>
                <div class="relative flex-1 max-w-md mx-6">
                    <input type="text" id="header-search"
                        placeholder="別の行き先を検索..."
                        class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 text-white placeholder-blue-200 border border-white border-opacity-30 focus:bg-white focus:text-gray-800 focus:placeholder-gray-400 focus:outline-none transition"
                        autocomplete="off">
                    <div id="header-ac-list" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 hidden max-h-60 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Destination Hero -->
    <div class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div class="flex items-center gap-3">
                <a href="/" class="text-gray-400 hover:text-gray-600 text-sm">トップ</a>
                <span class="text-gray-300">›</span>
                <span class="text-gray-600 text-sm" id="breadcrumb-dest"></span>
            </div>
            <div class="mt-3 flex items-center gap-4">
                <span class="text-4xl" id="dest-flag"></span>
                <div>
                    <h1 class="text-3xl font-bold text-gray-800" id="dest-title"></h1>
                    <p class="text-gray-500" id="dest-subtitle"></p>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- Month Navigation -->
        <div class="flex items-center justify-between mb-6">
            <button id="prev-month" class="flex items-center gap-1 px-4 py-2 bg-white rounded-lg shadow-sm hover:shadow-md transition text-gray-700 font-medium">
                ◀ 前月
            </button>
            <h2 id="month-display" class="text-xl font-bold text-gray-800"></h2>
            <button id="next-month" class="flex items-center gap-1 px-4 py-2 bg-white rounded-lg shadow-sm hover:shadow-md transition text-gray-700 font-medium">
                翌月 ▶
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden text-center py-16">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
            <p class="mt-4 text-gray-600">フライト価格を検索中...</p>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <!-- Quick Search Links -->
            <div class="bg-white rounded-xl shadow-md p-5 mb-6">
                <h3 class="font-bold text-gray-700 mb-3">他のサイトで検索する</h3>
                <div class="flex flex-wrap gap-3" id="external-search-links"></div>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-red-500">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-2xl">🔴</span>
                        <div>
                            <h3 class="font-bold text-lg">羽田空港 (HND)</h3>
                            <p class="text-sm text-gray-500">Tokyo Haneda</p>
                        </div>
                    </div>
                    <div id="hnd-best"></div>
                </div>
                <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-2xl">🔵</span>
                        <div>
                            <h3 class="font-bold text-lg">成田空港 (NRT)</h3>
                            <p class="text-sm text-gray-500">Tokyo Narita</p>
                        </div>
                    </div>
                    <div id="nrt-best"></div>
                </div>
            </div>

            <!-- Recommendation -->
            <div id="recommendation" class="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-xl p-5 mb-6 hidden">
                <div class="flex items-start gap-3">
                    <span class="text-2xl">💡</span>
                    <div id="recommendation-text" class="text-green-800"></div>
                </div>
            </div>

            <!-- Price Calendar -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-gray-800">価格カレンダー</h2>
                    <div class="flex gap-4 text-sm">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-400 inline-block"></span> 羽田</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-400 inline-block"></span> 成田</span>
                    </div>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-1"></div>
            </div>

            <!-- Bar Chart -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4">日別価格比較</h2>
                <div id="chart-container" class="overflow-x-auto">
                    <div id="price-chart" class="flex items-end gap-1 min-h-64 pb-8 relative"></div>
                </div>
            </div>

            <!-- Price Table -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4">価格一覧（安い順）</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b-2 border-gray-200 text-sm text-gray-600">
                                <th class="py-3 px-3">日付</th>
                                <th class="py-3 px-3">曜日</th>
                                <th class="py-3 px-3">出発空港</th>
                                <th class="py-3 px-3">価格</th>
                                <th class="py-3 px-3">直行/乗継</th>
                                <th class="py-3 px-3">航空会社</th>
                                <th class="py-3 px-3">出発</th>
                                <th class="py-3 px-3">所要時間</th>
                                <th class="py-3 px-3">差額</th>
                                <th class="py-3 px-3"></th>
                            </tr>
                        </thead>
                        <tbody id="price-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Data source -->
        <div id="data-source-notice" class="hidden mt-6 text-center text-sm text-gray-400"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center py-6 mt-12">
        <p class="text-sm">FlightScope — 東京発フライト価格比較ツール</p>
        <p class="text-xs mt-1">※ 表示価格は参考値です。実際の価格は航空会社の公式サイトでご確認ください。</p>
    </footer>

    <script src="/app.js"></script>
</body>
</html>
